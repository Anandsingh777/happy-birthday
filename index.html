<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 Birthday Surprise!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --pink: #ff4d8e;
    --peach: #ff8a65;
    --yellow: #ffd54f;
    --purple: #ce93d8;
    --bg1: #ff6eb0;
    --bg2: #ff9575;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  body {
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* ── Sparkle Canvas ── */
  #canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Title ── */
  #title {
    margin-top: 10vh;
    font-family: 'Pacifico', cursive;
    font-size: clamp(22px, 7vw, 42px);
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2), 0 0 40px rgba(255,255,180,0.5);
    z-index: 10;
    animation: titleBounce 1s ease both;
    letter-spacing: 1px;
    padding: 0 16px;
    text-align: center;
  }

  #subtitle {
    margin-top: 8px;
    font-size: clamp(13px, 4vw, 18px);
    color: rgba(255,255,255,0.85);
    z-index: 10;
    animation: fadeIn 1.2s ease both;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @keyframes titleBounce {
    0%   { opacity:0; transform: scale(0.5) translateY(-30px); }
    70%  { transform: scale(1.1) translateY(4px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── Catch Button ── */
  #btn {
    position: fixed;
    padding: clamp(12px,3vw,16px) clamp(20px,5vw,32px);
    font-size: clamp(16px, 5vw, 22px);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    border: none;
    background: linear-gradient(135deg, #fff 0%, #ffe0ef 100%);
    color: var(--pink);
    border-radius: 50px;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(255,77,142,0.4), 0 2px 8px rgba(0,0,0,0.15);
    transition: box-shadow 0.15s;
    user-select: none;
    white-space: nowrap;
  }
  #btn:active {
    transform: scale(0.95);
  }

  /* Attempts counter ring */
  #counter {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.hit {
    background: #fff;
    transform: scale(1.3);
  }

  /* ── Prank Overlay ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: overlayIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    text-align: center;
    overflow-y: auto;
  }
  @keyframes overlayIn {
    from { opacity:0; transform:scale(0.85); }
    to   { opacity:1; transform:scale(1); }
  }

  #gotcha {
    font-family: 'Pacifico', cursive;
    font-size: clamp(28px, 9vw, 56px);
    color: #fff;
    text-shadow: 0 0 40px var(--yellow), 0 4px 16px rgba(0,0,0,0.3);
    animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.3s both;
    margin-bottom: 6px;
  }
  #gotcha2 {
    font-size: clamp(15px, 5vw, 22px);
    color: var(--yellow);
    font-weight: 700;
    letter-spacing: 1px;
    animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.5s both;
    margin-bottom: 20px;
  }
  @keyframes pop {
    from { opacity:0; transform:scale(0.4) rotate(-8deg); }
    to   { opacity:1; transform:scale(1) rotate(0); }
  }

  #prankImg {
    width: min(75vw, 260px);
    border-radius: 20px;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    border: 4px solid rgba(255,255,255,0.15);
    animation: pop 0.6s cubic-bezier(.34,1.56,.64,1) 0.7s both;
    object-fit: cover;
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
  }

  #realBtn {
    display: none;
    margin-top: 22px;
    padding: clamp(12px,3vw,16px) clamp(28px,7vw,44px);
    font-size: clamp(15px,4.5vw,20px);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    background: linear-gradient(135deg, var(--yellow), #ffab40);
    color: #1a1a2e;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(255,213,79,0.5);
    animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both;
    letter-spacing: 0.5px;
  }
  #realBtn:active { transform: scale(0.95); }

  #sorryMsg {
    display: none;
    margin-top: 20px;
    padding: 16px 22px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
    font-size: clamp(14px, 4.5vw, 18px);
    color: #fff;
    line-height: 1.6;
    max-width: 340px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.8s ease both;
  }

  /* ── Balloons ── */
  .balloon {
    position: fixed;
    bottom: -120px;
    width: clamp(28px, 6vw, 45px);
    height: clamp(38px, 8vw, 58px);
    border-radius: 50% 50% 45% 45%;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.5);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-3deg); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.7; }
    100% { transform: translateY(-115vh) rotate(3deg); opacity:0; }
  }

  /* ── Stars bg ── */
  .star {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    animation: twinkle ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle {
    from { opacity:0.1; transform:scale(0.8); }
    to   { opacity:0.8; transform:scale(1.2); }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="title">🎉 Catch the Button!</div>
<div id="subtitle">If you can… 😏</div>
<div id="counter"></div>

<button id="btn">Click Me 😎</button>

<!-- Prank Overlay -->
<div id="overlay">
  <div id="gotcha">!</div>
  <div id="gotcha2">Happy Birthday Khusboo didi 🎂🎊</div>
  <img id="prankImg" src="prank.png" alt="hehe">
  <button id="realBtn">See Real Face 👀</button>
  <div id="sorryMsg">😔 बहन, बहन तुझे किसी बात का बुरा लगे तो मुझसे माफ़ी मांग लेना बेझिझक❤️<br><br>तू मेरी सबसे प्यारी बहन है! 🥰</div>
</div>

<script>
  /* ── Particles / Confetti ── */
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle(x, y, burst) {
    const colors = ['#ff4d8e','#ffd54f','#ce93d8','#80deea','#ff8a65','#fff'];
    return {
      x, y,
      vx: (Math.random()-0.5) * (burst ? 10 : 1.5),
      vy: burst ? (Math.random()-1) * 12 : -Math.random()*2 - 0.5,
      r:  Math.random() * (burst ? 6 : 3) + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1,
      decay: Math.random() * 0.012 + (burst ? 0.02 : 0.005),
      type: burst ? (Math.random()>.5 ? 'circle' : 'rect') : 'circle'
    };
  }

  function spawnAmbient() {
    if (particles.length < 40) {
      particles.push(createParticle(Math.random()*W, H+10, false));
    }
  }

  function burstAt(x, y, n=25) {
    for (let i=0;i<n;i++) particles.push(createParticle(x, y, true));
  }

  function drawParticles() {
    ctx.clearRect(0,0,W,H);
    spawnAmbient();
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      if (p.type === 'rect') {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * 5);
        ctx.fillRect(-p.r, -p.r*1.5, p.r*2, p.r*3);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.15;
      p.vx *= 0.98;
      p.life -= p.decay;
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  /* ── Stars bg ── */
  for (let i=0; i<18; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*4+2;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*2}s`;
    document.body.appendChild(s);
  }

  /* ── Balloons ── */
  const colors = ['#ff6b9d','#ffd166','#a8dadc','#e63946','#06d6a0','#118ab2','#ff9a3c'];
  for (let i=0; i<10; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const dur = Math.random()*8 + 7;
    const delay = Math.random()*8;
    b.style.cssText = `left:${Math.random()*95}vw;background:${colors[i%colors.length]};animation-duration:${dur}s;animation-delay:${delay}s`;
    document.body.appendChild(b);
  }

  /* ── Counter Dots ── */
  const MAX = 6;
  const counter = document.getElementById('counter');
  const dots = [];
  for (let i=0; i<MAX; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    counter.appendChild(d);
    dots.push(d);
  }

  /* ── Button Logic ── */
  const btn = document.getElementById('btn');
  let attempts = 0;
  let locked = false;

  function placeButton() {
    const pad = 20;
    const bw = btn.offsetWidth  || 140;
    const bh = btn.offsetHeight || 52;
    const x = pad + Math.random() * (W - bw - pad*2);
    const y = pad + Math.random() * (H - bh - pad*2);
    btn.style.left = x + 'px';
    btn.style.top  = y + 'px';
  }
  placeButton();

  function handleTry(e) {
    e.preventDefault();
    if (locked) return;
    const rect = btn.getBoundingClientRect();
    burstAt(rect.left + rect.width/2, rect.top + rect.height/2, 18);
    if (attempts < MAX) dots[attempts].classList.add('hit');
    attempts++;
    if (attempts >= MAX) {
      locked = true;
      showPrank();
    } else {
      placeButton();
    }
  }

  btn.addEventListener('click',      handleTry, {passive:false});
  btn.addEventListener('touchstart', handleTry, {passive:false});

  /* ── Show Prank ── */
  function showPrank() {
    counter.style.display = 'none';
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    // Big confetti burst
    for (let i=0; i<6; i++) {
      setTimeout(() => burstAt(Math.random()*W, Math.random()*H*0.5, 20), i*200);
    }
    setTimeout(() => {
      const rb = document.getElementById('realBtn');
      rb.style.display = 'inline-block';
      rb.addEventListener('click',      showReal, {passive:false});
      rb.addEventListener('touchstart', showReal, {passive:false});
    }, 2500);
  }

  /* ── Show Real ── */
  function showReal(e) {
    e.preventDefault();
    document.getElementById('realBtn').style.display = 'none';
    const img = document.getElementById('prankImg');
    img.style.transition = 'opacity 0.4s';
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = 'prank2.jpeg';
      img.style.opacity = '1';
      for (let i=0; i<8; i++) setTimeout(() => burstAt(Math.random()*W, Math.random()*H*0.6, 15), i*150);
    }, 400);
    setTimeout(() => {
      document.getElementById('sorryMsg').style.display = 'block';
    }, 1800);
  }
</script>
</body>
</html>

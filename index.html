<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ Mobile responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise 🎁</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  text-align: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
  min-height: 100vh;
  padding: 10px;
}

h1 {
  margin-top: 30px;
  font-size: 6vw; /* responsive text */
  color: #fff;
}

#btn {
  position: absolute;
  padding: 12px 20px;
  font-size: 5vw;
  border: none;
  background: #ff4081;
  color: white;
  border-radius: 30px;
  cursor: pointer;
}

#message {
  display: none;
  font-size: 6vw;
  margin-top: 20px;
  color: #fff;
}

#finalImg {
  display: none;
  width: 90%;
  max-width: 300px;
  margin-top: 15px;
  border-radius: 15px;
}

#realBtn {
  display: none;
  margin-top: 15px;
  padding: 10px 15px;
  font-size: 5vw;
  background: black;
  color: white;
  border: none;
  border-radius: 20px;
}

#sorryMsg {
  display: none;
  margin-top: 20px;
  font-size: 5vw;
  color: #fff;
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 12px;
}

/* balloons */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 30px;
  height: 40px;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-120vh);}
}
</style>
</head>

<body>

<h1>🎉 Catch the Button 🎁</h1>

<button id="btn">Click Me 😎</button>

<div id="message">😂 Gotcha! Happy Birthday 🎂</div>

<img id="finalImg" src="prank.png">

<br>
<button id="realBtn">See Real Face 👀</button>

<div id="sorryMsg">
  😔 बहन तुझे किसी बात का बुरा लगे तो मुझसे माफ़ी मांग लेना बेझिझक❤️
</div>

<script>
const btn = document.getElementById("btn");

let attempts = 0;
const maxAttempts = 6; // 👈 5-6 tries

function moveButton() {
  const x = Math.random() * (window.innerWidth - btn.offsetWidth);
  const y = Math.random() * (window.innerHeight - btn.offsetHeight);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

moveButton();

// 👇 har try count hoga
btn.addEventListener("click", () => {
  attempts++;
  moveButton();

  if (attempts >= maxAttempts) {
    showPrank();
  }
});

btn.addEventListener("mouseover", moveButton);

function showPrank() {
  btn.style.display = "none";
  document.getElementById("message").style.display = "block";
  document.getElementById("finalImg").style.display = "block";

  setTimeout(() => {
    document.getElementById("realBtn").style.display = "inline-block";
  }, 3000);
}

// swap image
document.getElementById("realBtn").addEventListener("click", function() {
  document.getElementById("finalImg").src = "prank2.jpeg";

  setTimeout(() => {
    document.getElementById("sorryMsg").style.display = "block";
  }, 1500);
});

// balloons
for (let i = 0; i < 8; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  b.style.background = `hsl(${Math.random()*360},70%,60%)`;
  document.body.appendChild(b);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎁</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    min-height: 100vh;
  }

  h1 {
    margin-top: 40px;
    font-size: 2rem;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  }

  #btn {
    position: absolute;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    background: #ff4081;
    color: white;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #btn:hover {
    transform: scale(1.1);
  }

  #message {
    display: none;
    font-size: 26px;
    margin-top: 40px;
    color: #fff;
    animation: fadeIn 1s ease forwards;
  }

  #finalImg {
    display: none;
    width: 90%;
    max-width: 320px;
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: zoomIn 1s ease;
  }

  #realBtn {
    display: none;
    margin-top: 20px;
    padding: 12px 20px;
    font-size: 16px;
    background: #000;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
  }

  #realBtn:hover {
    background: #ff4081;
    transform: scale(1.1);
  }

  #sorryMsg {
    display: none;
    margin-top: 25px;
    font-size: 20px;
    color: #fff;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 15px;
    animation: fadeIn 1.5s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

  @keyframes zoomIn {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
  }

  /* 🎈 balloons */
  .balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 50px;
    border-radius: 50%;
    animation: float 6s linear infinite;
  }

  @keyframes float {
    from {transform: translateY(0);}
    to {transform: translateY(-120vh);}
  }

</style>
</head>

<body>

<h1>🎉 Catch the Button to Get Your Gift 🎁</h1>

<button id="btn">Click Me 😎</button>

<div id="message">😂 Gotcha! Happy Birthday 🎂</div>

<img id="finalImg" src="prank.png">

<br>
<button id="realBtn">See Real Face 👀</button>

<!-- 💖 Sorry Message -->
<div id="sorryMsg">
  😔 बहन तुझे किसी बात का बुरा लगे तो मुझसे माफ़ी मांग लेना बेझिझक<br>
   🎂
</div>

<script>
const btn = document.getElementById("btn");

// Move button randomly
function moveButton() {
  const x = Math.random() * (window.innerWidth - btn.offsetWidth);
  const y = Math.random() * (window.innerHeight - btn.offsetHeight);
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

moveButton();

btn.addEventListener("mouseover", moveButton);
btn.addEventListener("click", moveButton);

// Show prank after 8 sec
setTimeout(() => {
  btn.style.display = "none";
  document.getElementById("message").style.display = "block";
  document.getElementById("finalImg").style.display = "block";

  // show real button after 5 sec
  setTimeout(() => {
    document.getElementById("realBtn").style.display = "inline-block";
  }, 5000);

}, 8000);

// swap image + show sorry
document.getElementById("realBtn").addEventListener("click", function() {
  document.getElementById("finalImg").src = "prank2.jpeg";

  // show sorry message after 2 sec
  setTimeout(() => {
    document.getElementById("sorryMsg").style.display = "block";
  }, 2000);
});

// 🎈 Balloons
for (let i = 0; i < 10; i++) {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  b.style.background = `hsl(${Math.random()*360},70%,60%)`;
  b.style.animationDuration = (4 + Math.random()*3) + "s";
  document.body.appendChild(b);
}
</script>

</body>
</html>
